version: '3.8'
x-kafka-common: &kafka
  image: apache/kafka:4.3.0
services:
  kafka:
    <<: *kafka
    container_name: kafka-wikipedia
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT, EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

    healthcheck:
      test: [ "CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:29092", "--list" ]
      interval: 5s
      timeout: 5s
      retries: 5

    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-init:
    <<: *kafka
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ "/opt/kafka/bin/kafka-topics.sh" ]
    command: [ "--create", "--if-not-exists", "--bootstrap-server", "kafka:29092", "--topic", "wiki_raw_stream", "--partitions", "1", "--replication-factor", "1" ]
    restart: "no"

  wiki-producer:
    build:
      context: .
      dockerfile: Dockerfile.producer
    container_name: wiki-producer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./.env:/app/.env:ro
    restart: unless-stopped

  spark-processor:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: spark-processor
    depends_on:
      wiki-producer:
        condition: service_started
    volumes:
      - ./creds:/opt/spark/creds:ro
      - ./checkpoints:/tmp/spark_checkpoints
      - ./.env:/app/.env:ro
    command: python3 /app/stream_processor.py
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: wiki-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./.env:/app/.env:ro
      - ./creds:/opt/spark/creds:ro

volumes:
  kafka_data:
